<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Reservations | Posh Cuisine</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="css/admin.css" />
  </head>

  <body>
    <div class="dashboard">
      <!-- ================= Sidebar ================= -->

      <aside class="sidebar">
        <h2>
          Posh
          <span>Cuisine</span>
        </h2>

        <ul>
          <li onclick="location.href = 'dashboard.html'">
            <i class="fa-solid fa-chart-line"></i>
            Dashboard
          </li>

          <li class="active">
            <i class="fa-solid fa-calendar-check"></i>
            Reservations
          </li>

          <li onclick="location.href = 'menu.html'">
            <i class="fa-solid fa-utensils"></i>
            Menu
          </li>

          <li onclick="location.href = 'tables.html'">
            <i class="fa-solid fa-chair"></i>
            Tables
          </li>

          <li onclick="location.href = 'settings.html'">
            <i class="fa-solid fa-gear"></i>
            Settings
          </li>
        </ul>
      </aside>

      <!-- ================= Main ================= -->

      <main class="main-content">
        <!-- Header -->

        <div class="topbar">
          <div>
            <h1>Reservations</h1>

            <p>Manage customer reservations</p>
          </div>

          <button id="logoutBtn" class="logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i>

            Logout
          </button>
        </div>

        <!-- Reservation Card -->

        <section class="table-card">
          <!-- Filters -->

          <div class="reservation-controls">
            <input type="text" id="searchInput" placeholder="Search customer or phone" />

            <select id="statusFilter">
              <option value="">All Status</option>
              <option value="Pending">Pending</option>
              <option value="Confirmed">Confirmed</option>
              <option value="Cancelled">Cancelled</option>
            </select>

            <select id="sortFilter">
              <option value="newest">Newest First</option>
              <option value="oldest">Oldest First</option>
              <option value="guestsHigh">Guests High → Low</option>
              <option value="guestsLow">Guests Low → High</option>
            </select>
          </div>

          <!-- Table -->

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Customer</th>

                  <th>Phone</th>

                  <th>Guests</th>

                  <th>Date</th>

                  <th>Status</th>

                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="reservationTable">
                <!-- JS -->
              </tbody>
            </table>
          </div>

          <!-- Pagination -->

          <div id="pagination" class="pagination"></div>
        </section>
      </main>
    </div>

    <!-- ================= Reservation Modal ================= -->

    <div class="modal" id="reservationModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Reservation Details</h2>

          <span class="close-modal">&times;</span>
        </div>

        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>

    <!-- ================= Confirmation Modal ================= -->

    <div class="modal" id="confirmModal">
      <div class="modal-content small-modal">
        <div class="modal-header">
          <h2 id="confirmTitle">Confirm Action</h2>
        </div>

        <div class="modal-body">
          <p id="confirmMessage">Are you sure?</p>

          <div class="modal-actions">
            <button id="cancelAction" class="secondary-btn">Cancel</button>

            <button id="confirmAction" class="danger-btn">Continue</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Toast -->

    <div id="toast" class="toast"></div>

    <script src="js/authGuard.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/reservations.js"></script>
  </body>
</html>
