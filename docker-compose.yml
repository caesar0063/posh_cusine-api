version: '3.8'
services:
  app:
    build: .
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/posh-cuisine
      JWT_SECRET: ${JWT_SECRET}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      PORT: 5000
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
